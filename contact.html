<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — The Coding Professionals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body class="bg-white text-[#1c1d1f]">
  <div id="tcp-header"></div>

  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-16 grid md:grid-cols-2 gap-12">
    <div>
      <h1 class="font-display text-3xl font-bold">Get in touch</h1>
      <p class="text-gray-600 mt-3">Questions about a course, a technical issue, or a partnership idea — we'd like to hear from you.</p>

      <div class="mt-8 space-y-5 text-sm">
        <div class="flex items-start gap-3">
          <svg class="w-5 h-5 text-[#A435F0] shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/></svg>
          <div>
            <p class="font-medium">Support</p>
            <p id="support-email" class="text-gray-500">support@techdreamafrica.org</p>
          </div>
        </div>
        <div class="flex items-start gap-3">
          <svg class="w-5 h-5 text-[#A435F0] shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
          <div>
            <p class="font-medium">Response time</p>
            <p class="text-gray-500">We typically reply within 1–2 business days.</p>
          </div>
        </div>
      </div>
    </div>

    <div>
      <form id="contact-form" class="space-y-4" novalidate>
        <div>
          <label class="text-sm font-medium block mb-1">Your name</label>
          <input name="name" required class="tcp-input" placeholder="Full name" />
        </div>
        <div>
          <label class="text-sm font-medium block mb-1">Email</label>
          <input name="email" type="email" required class="tcp-input" placeholder="you@example.com" />
        </div>
        <div>
          <label class="text-sm font-medium block mb-1">Subject</label>
          <select name="subject" class="tcp-input">
            <option>General question</option>
            <option>Course support</option>
            <option>Billing & payments</option>
            <option>Partnership / teams</option>
            <option>Report a problem</option>
          </select>
        </div>
        <div>
          <label class="text-sm font-medium block mb-1">Message</label>
          <textarea name="message" rows="5" required class="tcp-input" placeholder="How can we help?"></textarea>
        </div>
        <button type="submit" id="contact-submit" class="tcp-btn-primary w-full">Send message</button>
      </form>
    </div>
  </main>

  <div id="tcp-footer"></div>

  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/partials.js"></script>
  <script>
    tcpRenderHeader("");
    tcpRenderFooter("");

    // Pull the support email from platform settings if available, falling back
    // to the default shown in the markup.
    (async () => {
      try {
        const { data } = await tcpSupabase.from("settings").select("value").eq("key", "support_email").maybeSingle();
        if (data?.value) {
          const email = typeof data.value === "string" ? JSON.parse(data.value) : data.value;
          if (email) document.getElementById("support-email").textContent = email;
        }
      } catch (e) {
        /* settings not reachable yet — keep the default shown */
      }
    })();

    document.getElementById("contact-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("contact-submit");
      const data = Object.fromEntries(new FormData(e.target));
      btn.disabled = true;
      btn.textContent = "Sending…";
      try {
        // No dedicated messages table yet — logged to activity_logs so an
        // admin can review it from the database until a proper inbox exists.
        await tcpSupabase.from("activity_logs").insert({
          action: "contact_form_submission",
          meta: data,
        });
        tcpToast("Message sent — we'll get back to you soon.", "success");
        e.target.reset();
      } catch (err) {
        tcpToast("Couldn't send your message. Please email us directly instead.", "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Send message";
      }
    });
  </script>
</body>
</html>
