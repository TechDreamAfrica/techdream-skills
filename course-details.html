<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course details — The Coding Professionals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body class="bg-white text-[#1c1d1f]">
  <div id="tcp-header"></div>

  <div id="course-loading" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="animate-pulse space-y-4 max-w-2xl">
      <div class="h-8 bg-gray-200 rounded w-3/4"></div>
      <div class="h-4 bg-gray-200 rounded w-1/2"></div>
      <div class="h-4 bg-gray-200 rounded w-1/3"></div>
    </div>
  </div>

  <div id="course-content" class="hidden">
    <!-- HERO -->
    <section class="bg-[#1c1d1f] text-white">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 grid lg:grid-cols-[1fr_360px] gap-10">
        <div>
          <nav class="text-xs text-gray-400 mb-4" id="breadcrumb"></nav>
          <h1 id="course-title" class="font-display text-2xl sm:text-3xl font-bold leading-tight"></h1>
          <p id="course-description" class="mt-3 text-gray-300 max-w-2xl"></p>
          <div class="flex flex-wrap items-center gap-4 mt-4 text-sm">
            <span class="flex items-center gap-1 text-amber-400 font-semibold">
              <span id="course-rating"></span>
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 15.27 16.18 19l-1.64-7.03L20 7.24l-7.19-.61L10 0 7.19 6.63 0 7.24l5.46 4.73L3.82 19 10 15.27Z"/></svg>
              <span id="course-rating-count" class="text-gray-400 font-normal"></span>
            </span>
            <span id="course-students" class="text-gray-300"></span>
            <span id="course-instructor" class="text-gray-300"></span>
          </div>
        </div>

        <!-- STICKY PURCHASE CARD -->
        <div class="lg:row-span-2">
          <div class="tcp-card bg-white text-[#1c1d1f] p-5 lg:sticky lg:top-24">
            <div class="h-44 rounded-xl bg-gray-100 overflow-hidden flex items-center justify-center mb-4">
              <img id="course-thumb" src="" alt="" class="w-full h-full object-cover hidden" />
              <svg id="course-thumb-fallback" class="w-10 h-10 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="m10.5 8.25 6 3.75-6 3.75V8.25Z"/></svg>
            </div>
            <div id="course-price" class="text-2xl font-bold mb-4"></div>
            <button id="enroll-btn" class="tcp-btn-primary w-full">Enroll now</button>
            <button id="wishlist-btn" class="tcp-btn-secondary w-full mt-2 flex items-center justify-center gap-2">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z"/></svg>
              <span id="wishlist-label">Add to wishlist</span>
            </button>
            <ul class="mt-5 text-sm text-gray-600 space-y-2">
              <li id="course-duration" class="flex items-center gap-2"></li>
              <li id="course-level-li" class="flex items-center gap-2"></li>
              <li id="course-language" class="flex items-center gap-2"></li>
              <li class="flex items-center gap-2">Certificate of completion</li>
            </ul>
          </div>
        </div>
      </div>
    </section>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 grid lg:grid-cols-[1fr_360px] gap-10">
      <div class="space-y-12">
        <!-- REQUIREMENTS / WHAT YOU'LL LEARN -->
        <section id="requirements-section" class="hidden">
          <h2 class="font-display text-xl font-bold mb-3">Requirements</h2>
          <p id="course-requirements" class="text-sm text-gray-600 whitespace-pre-line"></p>
        </section>

        <!-- CURRICULUM -->
        <section>
          <h2 class="font-display text-xl font-bold mb-4">Course content</h2>
          <div id="curriculum" class="border border-gray-200 rounded-xl divide-y divide-gray-200 overflow-hidden"></div>
        </section>

        <!-- PREREQUISITES -->
        <section id="prereq-section" class="hidden">
          <h2 class="font-display text-xl font-bold mb-3">Prerequisites</h2>
          <p id="course-prereq" class="text-sm text-gray-600 whitespace-pre-line"></p>
        </section>

        <!-- INSTRUCTOR -->
        <section>
          <h2 class="font-display text-xl font-bold mb-4">Instructor</h2>
          <div id="instructor-card" class="flex items-center gap-4"></div>
        </section>

        <!-- REVIEWS -->
        <section>
          <div class="flex items-center justify-between mb-4">
            <h2 class="font-display text-xl font-bold">Student reviews</h2>
            <div id="write-review-slot"></div>
          </div>
          <div id="reviews-list" class="space-y-5"></div>
        </section>
      </div>
    </main>
  </div>

  <div id="course-not-found" class="hidden max-w-md mx-auto px-4 py-20 text-center">
    <h1 class="font-display text-2xl font-bold">Course not found</h1>
    <p class="text-gray-500 mt-2">It may have been unpublished or the link is incorrect.</p>
    <a href="courses.html" class="tcp-btn-primary inline-block mt-6">Browse courses</a>
  </div>

  <div id="tcp-footer"></div>

  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/partials.js"></script>
  <script>
    tcpRenderHeader("");
    tcpRenderFooter("");

    const slug = new URLSearchParams(window.location.search).get("slug");
    let course = null;

    function starsHtml(rating) {
      const pct = Math.max(0, Math.min(5, rating || 0)) * 20;
      return `<span class="tcp-stars">★★★★★<span class="tcp-star-fill" style="width:${pct}%">★★★★★</span></span>`;
    }

    async function loadCourse() {
      if (!slug) return showNotFound();
      const { data, error } = await tcpSupabase
        .from("courses")
        .select("*, profiles:instructor_id(id, fullname, bio, avatar), categories:category_id(name, slug)")
        .eq("slug", slug)
        .eq("status", "published")
        .single();

      if (error || !data) return showNotFound();
      course = data;
      renderCourse();
      loadCurriculum();
      loadReviews();
      checkEnrollmentAndWishlist();
    }

    function showNotFound() {
      document.getElementById("course-loading").classList.add("hidden");
      document.getElementById("course-not-found").classList.remove("hidden");
    }

    function renderCourse() {
      document.getElementById("course-loading").classList.add("hidden");
      document.getElementById("course-content").classList.remove("hidden");

      document.getElementById("breadcrumb").innerHTML = `<a href="courses.html" class="hover:underline">Courses</a> / ${course.categories?.name || "General"}`;
      document.getElementById("course-title").textContent = course.title;
      document.getElementById("course-description").textContent = course.description || "";
      document.getElementById("course-rating").innerHTML = (course.rating_avg || 0).toFixed(1);
      document.getElementById("course-rating-count").textContent = `(${course.rating_count || 0} ratings)`;
      document.getElementById("course-students").textContent = `${course.students_count || 0} students`;
      document.getElementById("course-instructor").textContent = `Created by ${course.profiles?.fullname || "TCP Instructor"}`;

      const price = course.discount_price != null ? course.discount_price : course.price;
      const struck = course.discount_price != null && course.discount_price < course.price;
      document.getElementById("course-price").innerHTML = `
        ${Number(price) === 0 ? "Free" : `$${Number(price).toFixed(2)}`}
        ${struck ? `<span class="text-gray-400 line-through font-normal text-base ml-2">$${Number(course.price).toFixed(2)}</span>` : ""}
      `;

      if (course.thumbnail) {
        document.getElementById("course-thumb").src = course.thumbnail;
        document.getElementById("course-thumb").classList.remove("hidden");
        document.getElementById("course-thumb-fallback").classList.add("hidden");
      }

      document.getElementById("course-duration").innerHTML = `⏱ ${Math.round((course.duration_minutes || 0) / 60)} hours total`;
      document.getElementById("course-level-li").innerHTML = `📶 <span class="capitalize">${course.level}</span> level`;
      document.getElementById("course-language").innerHTML = `🌐 ${course.language || "English"}`;

      if (course.requirements) {
        document.getElementById("requirements-section").classList.remove("hidden");
        document.getElementById("course-requirements").textContent = course.requirements;
      }
      if (course.prerequisites) {
        document.getElementById("prereq-section").classList.remove("hidden");
        document.getElementById("course-prereq").textContent = course.prerequisites;
      }

      document.getElementById("instructor-card").innerHTML = `
        <div class="w-16 h-16 rounded-full bg-[#A435F0] text-white font-bold text-xl flex items-center justify-center shrink-0">
          ${(course.profiles?.fullname || "?").charAt(0).toUpperCase()}
        </div>
        <div>
          <p class="font-semibold">${course.profiles?.fullname || "TCP Instructor"}</p>
          <p class="text-sm text-gray-600 mt-1">${course.profiles?.bio || "Software engineer and instructor at The Coding Professionals."}</p>
        </div>
      `;

      document.title = `${course.title} — The Coding Professionals`;
    }

    async function loadCurriculum() {
      const el = document.getElementById("curriculum");
      el.innerHTML = tcpSkeletonCards(3);

      const { data: sections } = await tcpSupabase
        .from("course_sections")
        .select("*, lessons(id, title, duration_seconds, is_preview, position)")
        .eq("course_id", course.id)
        .order("position");

      if (!sections || sections.length === 0) {
        el.innerHTML = tcpEmptyState({ title: "Curriculum coming soon", message: "The instructor hasn't published lessons yet." });
        return;
      }

      el.innerHTML = sections
        .map((s, idx) => {
          const lessons = (s.lessons || []).sort((a, b) => a.position - b.position);
          const totalMin = Math.round(lessons.reduce((sum, l) => sum + (l.duration_seconds || 0), 0) / 60);
          return `
          <details ${idx === 0 ? "open" : ""}>
            <summary class="cursor-pointer list-none flex items-center justify-between px-4 py-3 bg-gray-50 hover:bg-gray-100">
              <span class="font-semibold text-sm">${s.title}</span>
              <span class="text-xs text-gray-500">${lessons.length} lessons • ${totalMin} min</span>
            </summary>
            <div class="divide-y divide-gray-100">
              ${lessons
                .map(
                  (l) => `
                <div class="flex items-center justify-between px-4 py-3 text-sm">
                  <span class="flex items-center gap-2 text-gray-700">
                    <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="m10.5 8.25 6 3.75-6 3.75V8.25Z"/></svg>
                    ${l.title}
                    ${l.is_preview ? '<span class="tcp-badge">Preview</span>' : ""}
                  </span>
                  <span class="text-xs text-gray-400">${Math.round((l.duration_seconds || 0) / 60)} min</span>
                </div>`
                )
                .join("")}
            </div>
          </details>`;
        })
        .join("");
    }

    async function loadReviews() {
      const el = document.getElementById("reviews-list");
      const { data } = await tcpSupabase
        .from("reviews")
        .select("*, profiles:student_id(fullname)")
        .eq("course_id", course.id)
        .order("created_at", { ascending: false })
        .limit(10);

      if (!data || data.length === 0) {
        el.innerHTML = tcpEmptyState({ title: "No reviews yet", message: "Be the first student to review this course after enrolling." });
        return;
      }

      el.innerHTML = data
        .map(
          (r) => `
        <div class="border-b border-gray-100 pb-5">
          <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-xs font-semibold">${(r.profiles?.fullname || "?")
              .charAt(0)
              .toUpperCase()}</div>
            <span class="text-sm font-medium">${r.profiles?.fullname || "Student"}</span>
            ${starsHtml(r.rating)}
          </div>
          <p class="text-sm text-gray-600 mt-2">${r.comment || ""}</p>
        </div>`
        )
        .join("");
    }

    async function checkEnrollmentAndWishlist() {
      const session = await TcpAuth.getSession();
      const enrollBtn = document.getElementById("enroll-btn");
      const wishlistBtn = document.getElementById("wishlist-btn");
      const wishlistLabel = document.getElementById("wishlist-label");

      if (!session) {
        enrollBtn.onclick = () => (window.location.href = `pages/login.html`);
        wishlistBtn.onclick = () => (window.location.href = `pages/login.html`);
        return;
      }

      const { data: enrollment } = await tcpSupabase
        .from("enrollments")
        .select("id")
        .eq("student_id", session.user.id)
        .eq("course_id", course.id)
        .maybeSingle();

      if (enrollment) {
        enrollBtn.textContent = "Go to course";
        enrollBtn.onclick = () => (window.location.href = `pages/student/course-player.html?course=${course.id}`);
        showReviewButton(session);
      } else {
        enrollBtn.onclick = openCheckoutModal;
      }

      const { data: wish } = await tcpSupabase
        .from("wishlists")
        .select("id")
        .eq("student_id", session.user.id)
        .eq("course_id", course.id)
        .maybeSingle();
      let inWishlist = !!wish;
      wishlistLabel.textContent = inWishlist ? "Remove from wishlist" : "Add to wishlist";

      wishlistBtn.onclick = async () => {
        if (inWishlist) {
          await tcpSupabase.from("wishlists").delete().eq("student_id", session.user.id).eq("course_id", course.id);
          inWishlist = false;
          tcpToast("Removed from wishlist.", "info");
        } else {
          await tcpSupabase.from("wishlists").insert({ student_id: session.user.id, course_id: course.id });
          inWishlist = true;
          tcpToast("Added to wishlist.", "success");
        }
        wishlistLabel.textContent = inWishlist ? "Remove from wishlist" : "Add to wishlist";
      };
    }

    async function showReviewButton(session) {
      const slot = document.getElementById("write-review-slot");
      const { data: existingReview } = await tcpSupabase
        .from("reviews")
        .select("*")
        .eq("student_id", session.user.id)
        .eq("course_id", course.id)
        .maybeSingle();

      slot.innerHTML = `<button id="write-review-btn" class="text-sm font-semibold text-[#A435F0] hover:underline">${
        existingReview ? "Edit your review" : "Write a review"
      }</button>`;
      document.getElementById("write-review-btn").onclick = () => openReviewModal(session, existingReview);
    }

    function openReviewModal(session, existingReview) {
      let rating = existingReview?.rating || 5;
      const modal = tcpModal({
        title: existingReview ? "Edit your review" : "Write a review",
        bodyHtml: `
          <div class="flex gap-1 mb-4" id="star-picker">
            ${[1, 2, 3, 4, 5]
              .map(
                (n) => `<button type="button" data-star="${n}" class="star-btn text-2xl ${n <= rating ? "text-amber-500" : "text-gray-300"}">★</button>`
              )
              .join("")}
          </div>
          <textarea id="review-comment" rows="4" class="tcp-input" placeholder="Share your experience with this course…">${existingReview?.comment || ""}</textarea>
        `,
        footerHtml: `
          <button data-close class="tcp-btn-secondary">Cancel</button>
          <button id="submit-review-btn" class="tcp-btn-primary">${existingReview ? "Save changes" : "Submit review"}</button>
        `,
      });
      modal.querySelector("[data-close]").onclick = () => modal.close();
      modal.querySelectorAll(".star-btn").forEach((btn) =>
        btn.addEventListener("click", () => {
          rating = Number(btn.dataset.star);
          modal.querySelectorAll(".star-btn").forEach((b) => b.classList.toggle("text-amber-500", Number(b.dataset.star) <= rating));
          modal.querySelectorAll(".star-btn").forEach((b) => b.classList.toggle("text-gray-300", Number(b.dataset.star) > rating));
        })
      );
      modal.querySelector("#submit-review-btn").onclick = async () => {
        const comment = modal.querySelector("#review-comment").value.trim();
        const btn = modal.querySelector("#submit-review-btn");
        btn.disabled = true;
        const payload = { course_id: course.id, student_id: session.user.id, rating, comment };
        const { error } = existingReview
          ? await tcpSupabase.from("reviews").update(payload).eq("id", existingReview.id)
          : await tcpSupabase.from("reviews").insert(payload);
        if (error) {
          tcpToast("Couldn't save review: " + error.message, "error");
          btn.disabled = false;
          return;
        }
        modal.close();
        tcpToast("Thanks for your review!", "success");
        loadReviews();
        showReviewButton(session);
      };
    }

    function openCheckoutModal() {
      const price = course.discount_price != null ? course.discount_price : course.price;
      const modal = tcpModal({
        title: "Complete your enrollment",
        bodyHtml: `
          <p class="text-sm text-gray-600 mb-4">This is a payment placeholder — no real charge will be made. In production this modal calls a payment provider (Stripe, Paystack, etc.) from your backend.</p>
          <div class="rounded-lg bg-gray-50 p-4 flex items-center justify-between mb-4">
            <span class="text-sm font-medium">${course.title}</span>
            <span class="font-bold">${Number(price) === 0 ? "Free" : `$${Number(price).toFixed(2)}`}</span>
          </div>
          <div class="space-y-3">
            <input class="tcp-input" placeholder="Card number (e.g. 4242 4242 4242 4242)" />
            <div class="grid grid-cols-2 gap-3">
              <input class="tcp-input" placeholder="MM / YY" />
              <input class="tcp-input" placeholder="CVC" />
            </div>
          </div>
        `,
        footerHtml: `
          <button data-close class="tcp-btn-secondary">Cancel</button>
          <button id="confirm-pay" class="tcp-btn-primary">${Number(price) === 0 ? "Enroll for free" : "Pay & enroll"}</button>
        `,
      });
      modal.querySelector("[data-close]").onclick = () => modal.close();
      modal.querySelector("#confirm-pay").onclick = () => completeEnrollment(modal, price);
    }

    async function completeEnrollment(modal, price) {
      const btn = modal.querySelector("#confirm-pay");
      btn.disabled = true;
      btn.textContent = "Processing…";
      const session = await TcpAuth.getSession();
      try {
        if (price > 0) {
          await tcpSupabase.from("payments").insert({
            student_id: session.user.id,
            course_id: course.id,
            amount: price,
            status: "succeeded",
            provider_reference: "placeholder_" + Date.now(),
          });
        }
        await tcpSupabase.from("enrollments").insert({ student_id: session.user.id, course_id: course.id });
        await tcpSupabase.from("notifications").insert({
          user_id: session.user.id,
          type: "course_purchased",
          title: "You're enrolled!",
          body: `You successfully enrolled in ${course.title}.`,
          link: `pages/student/course-player.html?course=${course.id}`,
        });
        modal.close();
        tcpToast("Enrolled! Redirecting to your course…", "success");
        setTimeout(() => (window.location.href = `pages/student/course-player.html?course=${course.id}`), 1200);
      } catch (err) {
        tcpToast("Enrollment failed: " + (err.message || "please try again."), "error");
        btn.disabled = false;
        btn.textContent = "Pay & enroll";
      }
    }

    loadCourse();
  </script>
</body>
</html>
