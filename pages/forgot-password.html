<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot password — The Coding Professionals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body class="bg-white text-[#1c1d1f]">
  <div id="tcp-header"></div>

  <main class="max-w-md mx-auto px-4 py-16">
    <h1 class="font-display text-3xl font-bold text-center">Reset your password</h1>
    <p class="text-center text-gray-500 mt-2 text-sm">Enter your email and we'll send you a reset link.</p>

    <form id="forgot-form" class="mt-8 space-y-4" novalidate>
      <div>
        <label for="email" class="text-sm font-medium block mb-1">Email</label>
        <input id="email" name="email" type="email" required class="tcp-input" placeholder="you@example.com" />
      </div>
      <button type="submit" id="forgot-submit" class="tcp-btn-primary w-full">Send reset link</button>
    </form>

    <div id="forgot-success" class="hidden mt-6 rounded-lg bg-emerald-50 border border-emerald-100 text-emerald-700 text-sm px-4 py-3">
      If an account exists for that email, a reset link is on its way.
    </div>

    <p class="text-center text-sm text-gray-500 mt-6">
      <a href="login.html" class="text-[#A435F0] font-semibold hover:underline">← Back to log in</a>
    </p>
  </main>

  <div id="tcp-footer"></div>

  <script src="../assets/js/supabase-client.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/partials.js"></script>
  <script>
    tcpRenderHeader("../");
    tcpRenderFooter("../");

    document.getElementById("forgot-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("forgot-submit");
      const data = Object.fromEntries(new FormData(e.target));
      btn.disabled = true;
      btn.textContent = "Sending…";
      try {
        await TcpAuth.sendPasswordReset(data.email);
      } catch (err) {
        // Deliberately don't reveal whether the email exists — same UX either way.
      } finally {
        document.getElementById("forgot-form").classList.add("hidden");
        document.getElementById("forgot-success").classList.remove("hidden");
        btn.disabled = false;
        btn.textContent = "Send reset link";
      }
    });
  </script>
</body>
</html>
