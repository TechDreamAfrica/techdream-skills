<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Classes — The Coding Professionals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-white text-[#1c1d1f]">
  <div id="tcp-header"></div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex gap-8">
    <div id="student-sidebar" class="hidden lg:block w-56 shrink-0"></div>

    <main class="flex-1 min-w-0">
      <h1 class="font-display text-2xl font-bold mb-6">Live Classes</h1>

      <section class="mb-10">
        <h2 class="font-semibold text-sm text-gray-500 uppercase tracking-wide mb-3">Upcoming</h2>
        <div id="upcoming-list" class="tcp-card divide-y divide-gray-100"></div>
      </section>

      <section>
        <h2 class="font-semibold text-sm text-gray-500 uppercase tracking-wide mb-3">Past & replays</h2>
        <div id="past-list" class="tcp-card divide-y divide-gray-100"></div>
      </section>
    </main>
  </div>

  <div id="tcp-footer"></div>

  <script src="../../assets/js/supabase-client.js"></script>
  <script src="../../assets/js/ui.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/partials.js"></script>
  <script src="../../assets/js/student-nav.js"></script>
  <script>
    tcpRenderHeader("../../");
    tcpRenderFooter("../../");

    let session;

    async function init() {
      const profile = await TcpAuth.requireAuth({ role: ["student", "instructor", "admin"] });
      if (!profile) return;
      session = await TcpAuth.getSession();
      renderStudentSidebar("student-sidebar", "live-classes", "");
      load();
    }

    function countdownLabel(dateStr) {
      const diffMs = new Date(dateStr) - new Date();
      if (diffMs <= 0) return "Starting now";
      const days = Math.floor(diffMs / 86400000);
      const hours = Math.floor((diffMs % 86400000) / 3600000);
      if (days > 0) return `in ${days}d ${hours}h`;
      const mins = Math.floor((diffMs % 3600000) / 60000);
      return `in ${hours}h ${mins}m`;
    }

    async function load() {
      const upcomingEl = document.getElementById("upcoming-list");
      const pastEl = document.getElementById("past-list");
      upcomingEl.innerHTML = tcpSkeletonCards(2);
      pastEl.innerHTML = tcpSkeletonCards(2);

      const { data: enrollments } = await tcpSupabase.from("enrollments").select("course_id").eq("student_id", session.user.id);
      const courseIds = (enrollments || []).map((e) => e.course_id);
      if (!courseIds.length) {
        const empty = tcpEmptyState({ title: "No live classes available", message: "Enroll in a course to see its scheduled live classes here." });
        upcomingEl.innerHTML = empty;
        pastEl.innerHTML = "";
        return;
      }

      const { data: classes } = await tcpSupabase
        .from("live_classes")
        .select("*, courses(title)")
        .in("course_id", courseIds)
        .order("scheduled_at");

      const now = new Date();
      const upcoming = (classes || []).filter((c) => new Date(c.scheduled_at) >= now);
      const past = (classes || []).filter((c) => new Date(c.scheduled_at) < now);

      upcomingEl.innerHTML = upcoming.length
        ? upcoming
            .map(
              (c) => `
        <div class="flex items-center justify-between gap-4 px-5 py-4">
          <div>
            <p class="font-medium text-sm">${c.title}</p>
            <p class="text-xs text-gray-500 mt-0.5">${c.courses?.title || ""} • ${new Date(c.scheduled_at).toLocaleString()} • ${c.duration_minutes} min</p>
            <span class="tcp-badge mt-2">${countdownLabel(c.scheduled_at)}</span>
          </div>
          <a href="${c.meeting_link || "#"}" target="_blank" class="tcp-btn-primary text-xs !py-2 shrink-0" data-join="${c.id}">Join</a>
        </div>`
            )
            .join("")
        : tcpEmptyState({ title: "No upcoming live classes" });

      pastEl.innerHTML = past.length
        ? past
            .map(
              (c) => `
        <div class="flex items-center justify-between gap-4 px-5 py-4">
          <div>
            <p class="font-medium text-sm">${c.title}</p>
            <p class="text-xs text-gray-500 mt-0.5">${c.courses?.title || ""} • ${new Date(c.scheduled_at).toLocaleDateString()}</p>
          </div>
          ${
            c.replay_url
              ? `<a href="${c.replay_url}" target="_blank" class="tcp-btn-secondary text-xs !py-2 shrink-0">Watch replay</a>`
              : `<span class="text-xs text-gray-400 shrink-0">No replay uploaded</span>`
          }
        </div>`
            )
            .join("")
        : tcpEmptyState({ title: "No past live classes yet" });

      upcomingEl.querySelectorAll("[data-join]").forEach((a) =>
        a.addEventListener("click", async () => {
          const id = a.dataset.join;
          await tcpSupabase.from("live_class_attendance").upsert(
            { live_class_id: id, student_id: session.user.id },
            { onConflict: "live_class_id,student_id" }
          );
        })
      );
    }

    init();
  </script>
</body>
</html>
