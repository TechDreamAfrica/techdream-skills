<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — The Coding Professionals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-white text-[#1c1d1f]">
  <div id="tcp-header"></div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex gap-8">
    <div id="student-sidebar" class="hidden lg:block w-56 shrink-0"></div>

    <main class="flex-1 min-w-0">
      <div class="flex items-center justify-between gap-4 mb-6">
        <h1 class="font-display text-2xl font-bold">Notifications</h1>
        <button id="mark-all-btn" class="text-sm font-semibold text-[#A435F0] hover:underline">Mark all as read</button>
      </div>
      <div id="notifications-list" class="tcp-card divide-y divide-gray-100"></div>
    </main>
  </div>

  <div id="tcp-footer"></div>

  <script src="../../assets/js/supabase-client.js"></script>
  <script src="../../assets/js/ui.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/partials.js"></script>
  <script src="../../assets/js/student-nav.js"></script>
  <script>
    tcpRenderHeader("../../");
    tcpRenderFooter("../../");

    let session;

    const TYPE_ICON = {
      assignment_graded: "M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z",
      new_lesson: "m10.5 8.25 6 3.75-6 3.75V8.25Z",
      course_purchased: "M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Z",
      live_class_reminder: "M15.75 10.5 19.5 7.5v9l-3.75-3M4.5 18h9a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 13.5 6h-9A1.5 1.5 0 0 0 3 7.5v9A1.5 1.5 0 0 0 4.5 18Z",
      announcement: "M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 1 1 0-9h.75c.704 0 1.402-.03 2.09-.09m0 9.18c.253.962.584 1.892.985 2.783.247.55.06 1.21-.463 1.511l-.657.38c-.551.318-1.26.117-1.527-.461a20.845 20.845 0 0 1-1.44-4.282m3.102.069a18.03 18.03 0 0 1-.59-4.59c0-1.586.205-3.124.59-4.59m0 9.18a23.848 23.848 0 0 1 8.835 2.535M10.34 6.66a23.847 23.847 0 0 0 8.835-2.535m0 0A23.74 23.74 0 0 0 18.795 3m.38 1.125a23.91 23.91 0 0 1 1.014 5.395m-1.014 8.855c-.118.38-.245.754-.38 1.125m.38-1.125a23.91 23.91 0 0 0 1.014-5.395m0-3.46c.495.413.811 1.035.811 1.73 0 .695-.316 1.317-.811 1.73m0-3.46a24.347 24.347 0 0 1 0 3.46",
      discussion_reply: "M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25Z",
      certificate_ready: "M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.286Z",
    };

    async function init() {
      const profile = await TcpAuth.requireAuth({ role: ["student", "instructor", "admin"] });
      if (!profile) return;
      session = await TcpAuth.getSession();
      renderStudentSidebar("student-sidebar", "notifications", "");
      document.getElementById("mark-all-btn").addEventListener("click", markAllRead);
      load();
    }

    async function load() {
      const el = document.getElementById("notifications-list");
      el.innerHTML = tcpSkeletonCards(4);
      const { data } = await tcpSupabase
        .from("notifications")
        .select("*")
        .eq("user_id", session.user.id)
        .order("created_at", { ascending: false })
        .limit(50);

      if (!data || data.length === 0) {
        el.innerHTML = tcpEmptyState({ title: "No notifications", message: "You're all caught up." });
        return;
      }

      el.innerHTML = data
        .map(
          (n) => `
        <a href="${resolveLink(n.link)}" data-id="${n.id}" class="notif-item flex items-start gap-3 px-5 py-4 hover:bg-gray-50 ${n.is_read ? "" : "bg-purple-50/40"}">
          <div class="w-9 h-9 rounded-full bg-purple-50 flex items-center justify-center shrink-0">
            <svg class="w-4 h-4 text-[#A435F0]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7"><path stroke-linecap="round" stroke-linejoin="round" d="${
              TYPE_ICON[n.type] || TYPE_ICON.announcement
            }"/></svg>
          </div>
          <div class="flex-1">
            <p class="text-sm font-medium">${n.title}</p>
            ${n.body ? `<p class="text-xs text-gray-500 mt-0.5">${n.body}</p>` : ""}
            <p class="text-xs text-gray-400 mt-1">${new Date(n.created_at).toLocaleString()}</p>
          </div>
          ${!n.is_read ? '<span class="w-2 h-2 rounded-full bg-[#A435F0] mt-1.5 shrink-0"></span>' : ""}
        </a>`
        )
        .join("");

      el.querySelectorAll(".notif-item").forEach((a) =>
        a.addEventListener("click", async () => {
          await tcpSupabase.from("notifications").update({ is_read: true }).eq("id", a.dataset.id);
        })
      );
    }

    function resolveLink(link) {
      return link || "#";
    }

    async function markAllRead() {
      await tcpSupabase.from("notifications").update({ is_read: true }).eq("user_id", session.user.id).eq("is_read", false);
      tcpToast("All notifications marked as read.", "success");
      load();
    }

    init();
  </script>
</body>
</html>
