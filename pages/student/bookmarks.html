<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmarks — The Coding Professionals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-white text-[#1c1d1f]">
  <div id="tcp-header"></div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex gap-8">
    <div id="student-sidebar" class="hidden lg:block w-56 shrink-0"></div>

    <main class="flex-1 min-w-0">
      <h1 class="font-display text-2xl font-bold mb-6">Bookmarks</h1>
      <div id="bookmarks-list" class="tcp-card divide-y divide-gray-100"></div>
    </main>
  </div>

  <div id="tcp-footer"></div>

  <script src="../../assets/js/supabase-client.js"></script>
  <script src="../../assets/js/ui.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/partials.js"></script>
  <script src="../../assets/js/student-nav.js"></script>
  <script>
    tcpRenderHeader("../../");
    tcpRenderFooter("../../");

    let session;

    async function init() {
      const profile = await TcpAuth.requireAuth({ role: ["student", "instructor", "admin"] });
      if (!profile) return;
      session = await TcpAuth.getSession();
      renderStudentSidebar("student-sidebar", "bookmarks", "");
      load();
    }

    async function load() {
      const el = document.getElementById("bookmarks-list");
      el.innerHTML = tcpSkeletonCards(3);
      const { data } = await tcpSupabase
        .from("bookmarks")
        .select("*, lessons(id, title, course_id, courses:course_id(title))")
        .eq("student_id", session.user.id)
        .order("created_at", { ascending: false });

      if (!data || data.length === 0) {
        el.innerHTML = tcpEmptyState({
          title: "No bookmarks yet",
          message: "Bookmark a lesson from the course player to save it here with your notes.",
        });
        return;
      }

      el.innerHTML = data
        .map(
          (b) => `
        <div class="flex items-start justify-between gap-4 px-5 py-4">
          <div>
            <a href="course-player.html?course=${b.lessons?.course_id}&lesson=${b.lesson_id}" class="font-medium text-sm hover:text-[#A435F0]">${
            b.lessons?.title || "Lesson"
          }</a>
            <p class="text-xs text-gray-500 mt-0.5">${b.lessons?.courses?.title || ""}</p>
            ${b.note ? `<p class="text-sm text-gray-600 mt-2 bg-gray-50 rounded-lg px-3 py-2">${b.note}</p>` : ""}
          </div>
          <button data-id="${b.id}" class="remove-btn text-gray-400 hover:text-red-600 shrink-0" aria-label="Remove bookmark">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
          </button>
        </div>`
        )
        .join("");

      el.querySelectorAll(".remove-btn").forEach((btn) =>
        btn.addEventListener("click", async () => {
          await tcpSupabase.from("bookmarks").delete().eq("id", btn.dataset.id);
          tcpToast("Bookmark removed.", "info");
          load();
        })
      );
    }

    init();
  </script>
</body>
</html>
