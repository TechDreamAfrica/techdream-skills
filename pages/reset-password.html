<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set a new password — The Coding Professionals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body class="bg-white text-[#1c1d1f]">
  <div id="tcp-header"></div>

  <main class="max-w-md mx-auto px-4 py-16">
    <h1 class="font-display text-3xl font-bold text-center">Set a new password</h1>
    <p class="text-center text-gray-500 mt-2 text-sm">Choose a strong password you haven't used before.</p>

    <form id="reset-form" class="mt-8 space-y-4" novalidate>
      <div>
        <label for="password" class="text-sm font-medium block mb-1">New password</label>
        <input id="password" name="password" type="password" required minlength="6" class="tcp-input" placeholder="At least 6 characters" />
      </div>
      <div>
        <label for="confirm" class="text-sm font-medium block mb-1">Confirm password</label>
        <input id="confirm" name="confirm" type="password" required minlength="6" class="tcp-input" placeholder="Repeat password" />
      </div>
      <button type="submit" id="reset-submit" class="tcp-btn-primary w-full">Update password</button>
    </form>
  </main>

  <div id="tcp-footer"></div>

  <script src="../assets/js/supabase-client.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/partials.js"></script>
  <script>
    tcpRenderHeader("../");
    tcpRenderFooter("../");

    document.getElementById("reset-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("reset-submit");
      const data = Object.fromEntries(new FormData(e.target));
      if (data.password !== data.confirm) {
        tcpToast("Passwords don't match.", "error");
        return;
      }
      btn.disabled = true;
      btn.textContent = "Updating…";
      try {
        await TcpAuth.updatePassword(data.password);
        tcpToast("Password updated. Redirecting to log in…", "success");
        setTimeout(() => (window.location.href = "login.html"), 1500);
      } catch (err) {
        tcpToast(TcpAuth.friendlyError(err), "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Update password";
      }
    });
  </script>
</body>
</html>
