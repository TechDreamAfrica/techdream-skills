<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Announcements — Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-white text-[#1c1d1f]">
  <div id="tcp-header"></div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex gap-8">
    <div id="admin-sidebar" class="hidden lg:block w-56 shrink-0"></div>

    <main class="flex-1 min-w-0">
      <div class="flex items-center justify-between gap-4 mb-6 flex-wrap">
        <h1 class="font-display text-2xl font-bold">Announcements</h1>
        <button id="new-btn" class="tcp-btn-primary text-sm">+ New announcement</button>
      </div>
      <div id="list" class="space-y-4"></div>
    </main>
  </div>

  <div id="tcp-footer"></div>

  <script src="../../assets/js/supabase-client.js"></script>
  <script src="../../assets/js/ui.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/partials.js"></script>
  <script src="../../assets/js/admin-nav.js"></script>
  <script>
    tcpRenderHeader("../../");
    tcpRenderFooter("../../");

    let session, courses = [];

    async function init() {
      const profile = await TcpAuth.requireAuth({ role: "admin" });
      if (!profile) return;
      session = await TcpAuth.getSession();
      renderAdminSidebar("admin-sidebar", "announcements", "");
      const { data } = await tcpSupabase.from("courses").select("id, title").order("title");
      courses = data || [];
      document.getElementById("new-btn").addEventListener("click", openNewModal);
      load();
    }

    async function load() {
      const el = document.getElementById("list");
      el.innerHTML = tcpSkeletonCards(3);
      const { data } = await tcpSupabase.from("announcements").select("*, courses(title)").order("created_at", { ascending: false });

      if (!data || data.length === 0) {
        el.innerHTML = tcpEmptyState({ title: "No announcements yet", actionLabel: "New announcement" });
        setTimeout(() => document.getElementById("tcp-empty-action")?.addEventListener("click", openNewModal), 0);
        return;
      }

      el.innerHTML = data
        .map(
          (a) => `
        <div class="tcp-card p-5 flex items-start justify-between gap-4">
          <div>
            <div class="flex items-center gap-2 mb-1">
              <span class="tcp-badge">${a.courses?.title || "Platform-wide"}</span>
              <span class="text-xs text-gray-400">${new Date(a.created_at).toLocaleDateString()}</span>
            </div>
            <p class="font-semibold text-sm">${a.title}</p>
            <p class="text-sm text-gray-600 mt-1">${a.body}</p>
          </div>
          <button data-id="${a.id}" class="delete-btn text-xs font-semibold text-red-600 hover:underline shrink-0">Delete</button>
        </div>`
        )
        .join("");

      el.querySelectorAll(".delete-btn").forEach((btn) =>
        btn.addEventListener("click", async () => {
          const ok = await tcpConfirm({ title: "Delete this announcement?", confirmLabel: "Delete", danger: true });
          if (!ok) return;
          await tcpSupabase.from("announcements").delete().eq("id", btn.dataset.id);
          tcpToast("Announcement deleted.", "success");
          load();
        })
      );
    }

    function openNewModal() {
      const modal = tcpModal({
        title: "New announcement",
        bodyHtml: `
          <form id="ann-form" class="space-y-3">
            <select name="course_id" class="tcp-input">
              <option value="">Platform-wide (all students)</option>
              ${courses.map((c) => `<option value="${c.id}">${c.title}</option>`).join("")}
            </select>
            <input name="title" required placeholder="Title" class="tcp-input" />
            <textarea name="body" rows="4" required placeholder="Message" class="tcp-input"></textarea>
          </form>
        `,
        footerHtml: `
          <button data-close class="tcp-btn-secondary">Cancel</button>
          <button id="publish-btn" class="tcp-btn-primary">Publish</button>
        `,
      });
      modal.querySelector("[data-close]").onclick = () => modal.close();
      modal.querySelector("#publish-btn").onclick = async () => {
        const form = modal.querySelector("#ann-form");
        if (!form.reportValidity()) return;
        const data = Object.fromEntries(new FormData(form));
        const btn = modal.querySelector("#publish-btn");
        btn.disabled = true;
        const { error } = await tcpSupabase.from("announcements").insert({
          course_id: data.course_id || null,
          title: data.title,
          body: data.body,
          created_by: session.user.id,
        });
        if (error) {
          tcpToast("Couldn't publish: " + error.message, "error");
          btn.disabled = false;
          return;
        }
        modal.close();
        tcpToast("Announcement published.", "success");
        load();
      };
    }

    init();
  </script>
</body>
</html>
