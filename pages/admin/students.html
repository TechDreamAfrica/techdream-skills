<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Students — The Coding Professionals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-white text-[#1c1d1f]">
  <div id="tcp-header"></div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex gap-8">
    <div id="admin-sidebar" class="hidden lg:block w-56 shrink-0"></div>

    <main class="flex-1 min-w-0">
      <div class="flex items-center justify-between gap-4 mb-6 flex-wrap">
        <h1 class="font-display text-2xl font-bold">Students</h1>
        <input id="search-input" type="search" placeholder="Search by name or email" class="tcp-input max-w-xs" />
      </div>

      <div class="tcp-card overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-100 text-left text-xs text-gray-500 uppercase tracking-wide">
              <th class="px-5 py-3">Name</th>
              <th class="px-5 py-3">Email</th>
              <th class="px-5 py-3">Joined</th>
              <th class="px-5 py-3">Status</th>
              <th class="px-5 py-3 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="students-tbody" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
    </main>
  </div>

  <div id="tcp-footer"></div>

  <script src="../../assets/js/supabase-client.js"></script>
  <script src="../../assets/js/ui.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/partials.js"></script>
  <script src="../../assets/js/admin-nav.js"></script>
  <script>
    tcpRenderHeader("../../");
    tcpRenderFooter("../../");

    let students = [];

    async function init() {
      const profile = await TcpAuth.requireAuth({ role: "admin" });
      if (!profile) return;
      renderAdminSidebar("admin-sidebar", "students", "");
      await load();
      document.getElementById("search-input").addEventListener("input", (e) => render(e.target.value));
    }

    async function load() {
      const tbody = document.getElementById("students-tbody");
      tbody.innerHTML = `<tr><td colspan="5" class="px-5 py-8 text-center text-gray-400">Loading…</td></tr>`;
      const { data, error } = await tcpSupabase.from("profiles").select("*").eq("role", "student").order("created_at", { ascending: false });
      students = data || [];
      render("");
    }

    function render(filter) {
      const tbody = document.getElementById("students-tbody");
      const f = filter.trim().toLowerCase();
      const list = f ? students.filter((s) => s.fullname.toLowerCase().includes(f) || s.email.toLowerCase().includes(f)) : students;

      if (list.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5">${tcpEmptyState({ title: "No students found" })}</td></tr>`;
        return;
      }

      tbody.innerHTML = list
        .map(
          (s) => `
        <tr>
          <td class="px-5 py-3 font-medium">${s.fullname}</td>
          <td class="px-5 py-3 text-gray-500">${s.email}</td>
          <td class="px-5 py-3 text-gray-500">${new Date(s.created_at).toLocaleDateString()}</td>
          <td class="px-5 py-3">
            ${s.is_suspended ? '<span class="tcp-badge bg-red-50 text-red-600">Suspended</span>' : '<span class="tcp-badge bg-emerald-50 text-emerald-700">Active</span>'}
          </td>
          <td class="px-5 py-3 text-right space-x-2 whitespace-nowrap">
            <button data-id="${s.id}" class="promote-btn text-xs font-semibold text-[#A435F0] hover:underline">Promote to instructor</button>
            <button data-id="${s.id}" data-suspended="${s.is_suspended}" class="suspend-btn text-xs font-semibold ${
            s.is_suspended ? "text-emerald-600" : "text-amber-600"
          } hover:underline">${s.is_suspended ? "Unsuspend" : "Suspend"}</button>
            <button data-id="${s.id}" class="delete-btn text-xs font-semibold text-red-600 hover:underline">Delete</button>
          </td>
        </tr>`
        )
        .join("");

      tbody.querySelectorAll(".promote-btn").forEach((btn) =>
        btn.addEventListener("click", async () => {
          const ok = await tcpConfirm({ title: "Promote to instructor?", message: "They'll gain access to create and manage courses." });
          if (!ok) return;
          await tcpSupabase.from("profiles").update({ role: "instructor" }).eq("id", btn.dataset.id);
          tcpToast("Student promoted to instructor.", "success");
          load();
        })
      );
      tbody.querySelectorAll(".suspend-btn").forEach((btn) =>
        btn.addEventListener("click", async () => {
          const nowSuspended = btn.dataset.suspended === "true";
          await tcpSupabase.from("profiles").update({ is_suspended: !nowSuspended }).eq("id", btn.dataset.id);
          tcpToast(nowSuspended ? "Student unsuspended." : "Student suspended.", "success");
          load();
        })
      );
      tbody.querySelectorAll(".delete-btn").forEach((btn) =>
        btn.addEventListener("click", async () => {
          const ok = await tcpConfirm({ title: "Delete this student?", message: "This removes their profile record permanently.", confirmLabel: "Delete", danger: true });
          if (!ok) return;
          await tcpSupabase.from("profiles").delete().eq("id", btn.dataset.id);
          tcpToast("Student deleted.", "success");
          load();
        })
      );
    }

    init();
  </script>
</body>
</html>
