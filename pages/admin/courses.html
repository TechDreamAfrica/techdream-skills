<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Courses — The Coding Professionals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-white text-[#1c1d1f]">
  <div id="tcp-header"></div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex gap-8">
    <div id="admin-sidebar" class="hidden lg:block w-56 shrink-0"></div>

    <main class="flex-1 min-w-0">
      <div class="flex items-center justify-between gap-4 mb-6 flex-wrap">
        <h1 class="font-display text-2xl font-bold">Courses</h1>
        <a href="course-edit.html" class="tcp-btn-primary text-sm">+ New course</a>
      </div>

      <div class="tcp-card overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-100 text-left text-xs text-gray-500 uppercase tracking-wide">
              <th class="px-5 py-3">Course</th>
              <th class="px-5 py-3">Instructor</th>
              <th class="px-5 py-3">Price</th>
              <th class="px-5 py-3">Lessons</th>
              <th class="px-5 py-3">Students</th>
              <th class="px-5 py-3">Status</th>
              <th class="px-5 py-3 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="courses-tbody" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
    </main>
  </div>

  <div id="tcp-footer"></div>

  <script src="../../assets/js/supabase-client.js"></script>
  <script src="../../assets/js/ui.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/partials.js"></script>
  <script src="../../assets/js/admin-nav.js"></script>
  <script>
    tcpRenderHeader("../../");
    tcpRenderFooter("../../");

    async function init() {
      const profile = await TcpAuth.requireAuth({ role: "admin" });
      if (!profile) return;
      renderAdminSidebar("admin-sidebar", "courses", "");
      load();
    }

    function statusBadge(status) {
      const map = {
        draft: '<span class="tcp-badge bg-gray-100 text-gray-600">Draft</span>',
        published: '<span class="tcp-badge bg-emerald-50 text-emerald-700">Published</span>',
        archived: '<span class="tcp-badge bg-amber-50 text-amber-700">Archived</span>',
      };
      return map[status] || status;
    }

    async function load() {
      const tbody = document.getElementById("courses-tbody");
      tbody.innerHTML = `<tr><td colspan="7" class="px-5 py-8 text-center text-gray-400">Loading…</td></tr>`;
      const { data } = await tcpSupabase
        .from("courses")
        .select("*, profiles:instructor_id(fullname), lessons(id)")
        .order("created_at", { ascending: false });

      if (!data || data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7">${tcpEmptyState({ title: "No courses yet", message: "Create the first course to get started.", actionLabel: "New course" })}</td></tr>`;
        setTimeout(() => document.getElementById("tcp-empty-action")?.addEventListener("click", () => (window.location.href = "course-edit.html")), 0);
        return;
      }

      tbody.innerHTML = data
        .map(
          (c) => `
        <tr>
          <td class="px-5 py-3">
            <div class="flex items-center gap-3">
              <div class="w-14 h-9 rounded bg-gray-100 overflow-hidden shrink-0 flex items-center justify-center">
                ${
                  c.thumbnail
                    ? `<img src="${c.thumbnail}" class="w-full h-full object-cover" alt="" />`
                    : `<svg class="w-4 h-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="m10.5 8.25 6 3.75-6 3.75V8.25Z"/></svg>`
                }
              </div>
              <span class="font-medium max-w-xs truncate">${c.title}</span>
            </div>
          </td>
          <td class="px-5 py-3 text-gray-500">${c.profiles?.fullname || "—"}</td>
          <td class="px-5 py-3 text-gray-500">${Number(c.price) === 0 ? "Free" : "GHS " + Number(c.price).toFixed(2)}</td>
          <td class="px-5 py-3 text-gray-500">${c.lessons?.length || 0}</td>
          <td class="px-5 py-3 text-gray-500">${c.students_count || 0}</td>
          <td class="px-5 py-3">${statusBadge(c.status)}</td>
          <td class="px-5 py-3 text-right space-x-2 whitespace-nowrap">
            ${
              c.status !== "published"
                ? `<button data-id="${c.id}" data-status="published" class="status-btn text-xs font-semibold text-emerald-600 hover:underline">Publish</button>`
                : `<button data-id="${c.id}" data-status="archived" class="status-btn text-xs font-semibold text-amber-600 hover:underline">Archive</button>`
            }
            <a href="course-curriculum.html?course=${c.id}" class="text-xs font-semibold text-[#A435F0] hover:underline">Curriculum</a>
            <a href="course-edit.html?course=${c.id}" class="text-xs font-semibold text-gray-500 hover:underline">Edit</a>
            <a href="../../course-details.html?slug=${c.slug}" class="text-xs font-semibold text-gray-500 hover:underline">View</a>
            <button data-id="${c.id}" class="delete-btn text-xs font-semibold text-red-600 hover:underline">Delete</button>
          </td>
        </tr>`
        )
        .join("");

      tbody.querySelectorAll(".status-btn").forEach((btn) =>
        btn.addEventListener("click", async () => {
          await tcpSupabase.from("courses").update({ status: btn.dataset.status }).eq("id", btn.dataset.id);
          tcpToast(`Course ${btn.dataset.status === "published" ? "published" : "archived"}.`, "success");
          load();
        })
      );
      tbody.querySelectorAll(".delete-btn").forEach((btn) =>
        btn.addEventListener("click", async () => {
          const ok = await tcpConfirm({ title: "Delete this course?", message: "This permanently deletes the course and all its content.", confirmLabel: "Delete", danger: true });
          if (!ok) return;
          await tcpSupabase.from("courses").delete().eq("id", btn.dataset.id);
          tcpToast("Course deleted.", "success");
          load();
        })
      );
    }

    init();
  </script>
</body>
</html>
