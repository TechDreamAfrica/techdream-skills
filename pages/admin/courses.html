<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Courses — The Coding Professionals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-white text-[#1c1d1f]">
  <div id="tcp-header"></div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex gap-8">
    <div id="admin-sidebar" class="hidden lg:block w-56 shrink-0"></div>

    <main class="flex-1 min-w-0">
      <div class="flex items-center justify-between gap-4 mb-6 flex-wrap">
        <h1 class="font-display text-2xl font-bold">Courses</h1>
        <button id="new-course-btn" class="tcp-btn-primary text-sm">+ New course</button>
      </div>

      <div class="tcp-card overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-100 text-left text-xs text-gray-500 uppercase tracking-wide">
              <th class="px-5 py-3">Title</th>
              <th class="px-5 py-3">Instructor</th>
              <th class="px-5 py-3">Price</th>
              <th class="px-5 py-3">Students</th>
              <th class="px-5 py-3">Status</th>
              <th class="px-5 py-3 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="courses-tbody" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
    </main>
  </div>

  <div id="tcp-footer"></div>

  <script src="../../assets/js/supabase-client.js"></script>
  <script src="../../assets/js/ui.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/partials.js"></script>
  <script src="../../assets/js/admin-nav.js"></script>
  <script>
    tcpRenderHeader("../../");
    tcpRenderFooter("../../");

    let session, categories = [];

    async function init() {
      const profile = await TcpAuth.requireAuth({ role: "admin" });
      if (!profile) return;
      session = await TcpAuth.getSession();
      renderAdminSidebar("admin-sidebar", "courses", "");
      const { data } = await tcpSupabase.from("categories").select("*").order("name");
      categories = data || [];
      document.getElementById("new-course-btn").addEventListener("click", openNewCourseModal);
      load();
    }

    function statusBadge(status) {
      const map = {
        draft: '<span class="tcp-badge bg-gray-100 text-gray-600">Draft</span>',
        published: '<span class="tcp-badge bg-emerald-50 text-emerald-700">Published</span>',
        archived: '<span class="tcp-badge bg-amber-50 text-amber-700">Archived</span>',
      };
      return map[status] || status;
    }

    async function load() {
      const tbody = document.getElementById("courses-tbody");
      tbody.innerHTML = `<tr><td colspan="6" class="px-5 py-8 text-center text-gray-400">Loading…</td></tr>`;
      const { data } = await tcpSupabase
        .from("courses")
        .select("*, profiles:instructor_id(fullname)")
        .order("created_at", { ascending: false });

      if (!data || data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6">${tcpEmptyState({ title: "No courses yet", message: "Create the first course to get started.", actionLabel: "New course" })}</td></tr>`;
        setTimeout(() => document.getElementById("tcp-empty-action")?.addEventListener("click", openNewCourseModal), 0);
        return;
      }

      tbody.innerHTML = data
        .map(
          (c) => `
        <tr>
          <td class="px-5 py-3 font-medium max-w-xs truncate">${c.title}</td>
          <td class="px-5 py-3 text-gray-500">${c.profiles?.fullname || "—"}</td>
          <td class="px-5 py-3 text-gray-500">${Number(c.price) === 0 ? "Free" : "$" + Number(c.price).toFixed(2)}</td>
          <td class="px-5 py-3 text-gray-500">${c.students_count || 0}</td>
          <td class="px-5 py-3">${statusBadge(c.status)}</td>
          <td class="px-5 py-3 text-right space-x-2 whitespace-nowrap">
            ${
              c.status !== "published"
                ? `<button data-id="${c.id}" data-status="published" class="status-btn text-xs font-semibold text-emerald-600 hover:underline">Publish</button>`
                : `<button data-id="${c.id}" data-status="archived" class="status-btn text-xs font-semibold text-amber-600 hover:underline">Archive</button>`
            }
            <a href="../../course-details.html?slug=${c.slug}" class="text-xs font-semibold text-[#A435F0] hover:underline">View</a>
            <button data-id="${c.id}" class="delete-btn text-xs font-semibold text-red-600 hover:underline">Delete</button>
          </td>
        </tr>`
        )
        .join("");

      tbody.querySelectorAll(".status-btn").forEach((btn) =>
        btn.addEventListener("click", async () => {
          await tcpSupabase.from("courses").update({ status: btn.dataset.status }).eq("id", btn.dataset.id);
          tcpToast(`Course ${btn.dataset.status === "published" ? "published" : "archived"}.`, "success");
          load();
        })
      );
      tbody.querySelectorAll(".delete-btn").forEach((btn) =>
        btn.addEventListener("click", async () => {
          const ok = await tcpConfirm({ title: "Delete this course?", message: "This permanently deletes the course and all its content.", confirmLabel: "Delete", danger: true });
          if (!ok) return;
          await tcpSupabase.from("courses").delete().eq("id", btn.dataset.id);
          tcpToast("Course deleted.", "success");
          load();
        })
      );
    }

    function slugify(str) {
      return str.toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "") + "-" + Date.now().toString(36).slice(-4);
    }

    function openNewCourseModal() {
      const modal = tcpModal({
        title: "New course",
        bodyHtml: `
          <form id="new-course-form" class="space-y-3">
            <input name="title" required placeholder="Course title" class="tcp-input" />
            <textarea name="description" rows="3" placeholder="Short description" class="tcp-input"></textarea>
            <div class="grid grid-cols-2 gap-3">
              <select name="category_id" class="tcp-input">
                <option value="">No category</option>
                ${categories.map((c) => `<option value="${c.id}">${c.name}</option>`).join("")}
              </select>
              <select name="level" class="tcp-input">
                <option value="beginner">Beginner</option>
                <option value="intermediate">Intermediate</option>
                <option value="advanced">Advanced</option>
              </select>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <input name="price" type="number" min="0" step="0.01" placeholder="Price (USD)" class="tcp-input" value="0" />
              <input name="duration_minutes" type="number" min="0" placeholder="Duration (minutes)" class="tcp-input" value="0" />
            </div>
          </form>
        `,
        footerHtml: `
          <button data-close class="tcp-btn-secondary">Cancel</button>
          <button id="create-course-confirm" class="tcp-btn-primary">Create course</button>
        `,
      });
      modal.querySelector("[data-close]").onclick = () => modal.close();
      modal.querySelector("#create-course-confirm").onclick = async () => {
        const form = modal.querySelector("#new-course-form");
        if (!form.reportValidity()) return;
        const data = Object.fromEntries(new FormData(form));
        const btn = modal.querySelector("#create-course-confirm");
        btn.disabled = true;
        btn.textContent = "Creating…";
        const { error } = await tcpSupabase.from("courses").insert({
          title: data.title,
          slug: slugify(data.title),
          description: data.description,
          category_id: data.category_id || null,
          level: data.level,
          price: Number(data.price) || 0,
          duration_minutes: Number(data.duration_minutes) || 0,
          instructor_id: session.user.id,
          status: "draft",
        });
        if (error) {
          tcpToast("Couldn't create course: " + error.message, "error");
          btn.disabled = false;
          btn.textContent = "Create course";
          return;
        }
        modal.close();
        tcpToast("Course created as draft.", "success");
        load();
      };
    }

    init();
  </script>
</body>
</html>
