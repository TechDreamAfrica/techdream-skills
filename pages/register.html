<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — The Coding Professionals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body class="bg-white text-[#1c1d1f]">
  <div id="tcp-header"></div>

  <main class="max-w-md mx-auto px-4 py-16">
    <h1 class="font-display text-3xl font-bold text-center">Create your account</h1>
    <p class="text-center text-gray-500 mt-2 text-sm">Start learning in minutes — it's free to join.</p>

    <form id="register-form" class="mt-8 space-y-4" novalidate>
      <div>
        <label for="fullname" class="text-sm font-medium block mb-1">Full name</label>
        <input id="fullname" name="fullname" type="text" required class="tcp-input" placeholder="Ama Serwaa" />
      </div>
      <div>
        <label for="email" class="text-sm font-medium block mb-1">Email</label>
        <input id="email" name="email" type="email" required class="tcp-input" placeholder="you@example.com" />
      </div>
      <div>
        <label for="password" class="text-sm font-medium block mb-1">Password</label>
        <input id="password" name="password" type="password" required minlength="6" class="tcp-input" placeholder="At least 6 characters" />
      </div>
      <div>
        <label for="role" class="text-sm font-medium block mb-1">I'm joining as</label>
        <select id="role" name="role" class="tcp-input">
          <option value="student">Student</option>
          <option value="instructor">Instructor</option>
        </select>
      </div>
      <label class="flex items-start gap-2 text-sm text-gray-600">
        <input type="checkbox" required class="mt-1" />
        I agree to the <a href="../terms.html" class="text-[#A435F0] hover:underline" target="_blank">Terms of Service</a> and <a href="../privacy-policy.html" class="text-[#A435F0] hover:underline" target="_blank">Privacy Policy</a>.
      </label>
      <button type="submit" id="register-submit" class="tcp-btn-primary w-full">Create account</button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Already have an account? <a href="login.html" class="text-[#A435F0] font-semibold hover:underline">Log in</a>
    </p>
  </main>

  <div id="tcp-footer"></div>

  <script src="../assets/js/supabase-client.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/partials.js"></script>
  <script>
    tcpRenderHeader("../");
    tcpRenderFooter("../");

    document.getElementById("register-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("register-submit");
      const data = Object.fromEntries(new FormData(e.target));
      btn.disabled = true;
      btn.textContent = "Creating account…";
      try {
        await TcpAuth.signUp({
          fullname: data.fullname,
          email: data.email,
          password: data.password,
          role: data.role,
        });
        tcpToast("Account created! Check your email to verify, then log in.", "success", 6000);
        e.target.reset();
        setTimeout(() => (window.location.href = "login.html"), 1500);
      } catch (err) {
        tcpToast(TcpAuth.friendlyError(err), "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Create account";
      }
    });
  </script>
</body>
</html>
