<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse courses — The Coding Professionals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body class="bg-white text-[#1c1d1f]">
  <div id="tcp-header"></div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
      <div>
        <h1 class="font-display text-2xl sm:text-3xl font-bold" id="results-heading">All courses</h1>
        <p id="results-count" class="text-sm text-gray-500 mt-1"></p>
      </div>
      <button id="mobile-filters-toggle" class="lg:hidden tcp-btn-secondary text-sm !py-2 self-start">Filters</button>
    </div>

    <div class="grid lg:grid-cols-[240px_1fr] gap-8">
      <!-- FILTERS -->
      <aside id="filters-panel" class="hidden lg:block space-y-8">
        <div>
          <h3 class="font-semibold text-sm mb-3">Category</h3>
          <div id="category-filters" class="space-y-2 text-sm"></div>
        </div>
        <div>
          <h3 class="font-semibold text-sm mb-3">Level</h3>
          <div class="space-y-2 text-sm">
            <label class="flex items-center gap-2"><input type="checkbox" class="level-filter" value="beginner" /> Beginner</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="level-filter" value="intermediate" /> Intermediate</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="level-filter" value="advanced" /> Advanced</label>
          </div>
        </div>
        <div>
          <h3 class="font-semibold text-sm mb-3">Price</h3>
          <div class="space-y-2 text-sm">
            <label class="flex items-center gap-2"><input type="radio" name="price-filter" class="price-filter" value="all" /> All</label>
            <label class="flex items-center gap-2"><input type="radio" name="price-filter" class="price-filter" value="free" /> Free</label>
            <label class="flex items-center gap-2"><input type="radio" name="price-filter" class="price-filter" value="paid" /> Paid</label>
          </div>
        </div>
        <button id="clear-filters" class="text-sm text-[#A435F0] font-semibold hover:underline">Clear all filters</button>
      </aside>

      <!-- RESULTS -->
      <section>
        <div id="courses-grid" class="grid sm:grid-cols-2 xl:grid-cols-3 gap-6"></div>
        <div id="pagination" class="flex items-center justify-center gap-2 mt-10"></div>
      </section>
    </div>
  </main>

  <div id="tcp-footer"></div>

  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/partials.js"></script>
  <script>
    tcpRenderHeader("");
    tcpRenderFooter("");

    const PAGE_SIZE = 9;
    let currentPage = 1;
    let allCategories = [];

    const params = new URLSearchParams(window.location.search);
    let state = {
      q: params.get("q") || "",
      category: params.get("category") || "",
      levels: [],
      price: params.get("price") === "free" || params.get("price") === "paid" ? params.get("price") : "all",
    };

    document.getElementById("mobile-filters-toggle").addEventListener("click", () => {
      document.getElementById("filters-panel").classList.toggle("hidden");
    });

    async function loadCategoryFilters() {
      const { data } = await tcpSupabase.from("categories").select("*").order("name");
      allCategories = data || [];
      const el = document.getElementById("category-filters");
      el.innerHTML = `
        <label class="flex items-center gap-2">
          <input type="radio" name="cat" class="cat-filter" value="" ${state.category ? "" : "checked"} /> All categories
        </label>
        ${allCategories
          .map(
            (c) => `
          <label class="flex items-center gap-2">
            <input type="radio" name="cat" class="cat-filter" value="${c.slug}" ${state.category === c.slug ? "checked" : ""} /> ${c.name}
          </label>`
          )
          .join("")}
      `;
      el.querySelectorAll(".cat-filter").forEach((input) =>
        input.addEventListener("change", (e) => {
          state.category = e.target.value;
          currentPage = 1;
          fetchAndRender();
        })
      );
    }

    document.querySelectorAll(".level-filter").forEach((input) =>
      input.addEventListener("change", () => {
        state.levels = Array.from(document.querySelectorAll(".level-filter:checked")).map((i) => i.value);
        currentPage = 1;
        fetchAndRender();
      })
    );
    document.querySelectorAll(".price-filter").forEach((input) =>
      input.addEventListener("change", (e) => {
        state.price = e.target.value;
        currentPage = 1;
        fetchAndRender();
      })
    );
    document.getElementById("clear-filters").addEventListener("click", () => {
      state = { q: state.q, category: "", levels: [], price: "all" };
      document.querySelectorAll(".level-filter").forEach((i) => (i.checked = false));
      document.querySelectorAll('input[name="price-filter"]')[0].checked = true;
      document.querySelector('.cat-filter[value=""]').checked = true;
      currentPage = 1;
      fetchAndRender();
    });

    function courseCardHtml(c) {
      const price = c.discount_price != null ? c.discount_price : c.price;
      const struck = c.discount_price != null && c.discount_price < c.price;
      return `
        <a href="course-details.html?slug=${c.slug}" class="tcp-card overflow-hidden flex flex-col">
          <div class="h-40 bg-gray-100 flex items-center justify-center relative">
            ${
              c.thumbnail
                ? `<img src="${c.thumbnail}" alt="${c.title}" class="w-full h-full object-cover" />`
                : `<svg class="w-10 h-10 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="m10.5 8.25 6 3.75-6 3.75V8.25Z"/></svg>`
            }
            ${c.teaser_video_url ? `<span class="absolute bottom-2 left-2 tcp-badge bg-black/60 text-white flex items-center gap-1"><svg class="w-2.5 h-2.5" fill="currentColor" viewBox="0 0 20 20"><path d="M6 4l10 6-10 6V4z"/></svg>Preview</span>` : ""}
          </div>
          <div class="p-4 flex flex-col gap-1.5 flex-1">
            <p class="font-semibold text-sm leading-snug line-clamp-2">${c.title}</p>
            <p class="text-xs text-gray-500">${c.profiles?.fullname || "TCP Instructor"}</p>
            <div class="flex items-center gap-1 text-xs text-amber-700 font-semibold">
              ${c.rating_avg?.toFixed?.(1) ?? "New"} <span class="text-gray-400 font-normal">(${c.rating_count || 0})</span>
            </div>
            <span class="tcp-badge w-fit capitalize">${c.level}</span>
            <div class="mt-auto pt-1 font-bold text-sm">
              ${Number(price) === 0 ? "Free" : `GHS ${Number(price).toFixed(2)}`}
              ${struck ? `<span class="text-gray-400 line-through font-normal ml-1">GHS ${Number(c.price).toFixed(2)}</span>` : ""}
            </div>
          </div>
        </a>`;
    }

    async function fetchAndRender() {
      const grid = document.getElementById("courses-grid");
      grid.innerHTML = tcpSkeletonCards(6);

      let query = tcpSupabase.from("courses").select("*, profiles:instructor_id(fullname)", { count: "exact" }).eq("status", "published");

      if (state.q) query = query.ilike("title", `%${state.q}%`);
      if (state.category) {
        const cat = allCategories.find((c) => c.slug === state.category);
        if (cat) query = query.eq("category_id", cat.id);
      }
      if (state.levels.length) query = query.in("level", state.levels);
      if (state.price === "free") query = query.eq("price", 0);
      if (state.price === "paid") query = query.gt("price", 0);

      const from = (currentPage - 1) * PAGE_SIZE;
      const to = from + PAGE_SIZE - 1;
      query = query.order("students_count", { ascending: false }).range(from, to);

      const { data, count, error } = await query;

      const heading = document.getElementById("results-heading");
      heading.textContent = state.q ? `Results for "${state.q}"` : "All courses";

      if (error || !data || data.length === 0) {
        grid.innerHTML = tcpEmptyState({
          title: "No courses match your filters",
          message: "Try clearing a filter or searching a different term.",
        });
        document.getElementById("results-count").textContent = "0 courses found";
        document.getElementById("pagination").innerHTML = "";
        return;
      }

      document.getElementById("results-count").textContent = `${count} course${count === 1 ? "" : "s"} found`;
      grid.innerHTML = data.map(courseCardHtml).join("");
      renderPagination(count);
    }

    function renderPagination(count) {
      const totalPages = Math.ceil(count / PAGE_SIZE);
      const el = document.getElementById("pagination");
      if (totalPages <= 1) {
        el.innerHTML = "";
        return;
      }
      let html = "";
      for (let i = 1; i <= totalPages; i++) {
        html += `<button data-page="${i}" class="page-btn w-9 h-9 rounded-lg text-sm font-medium ${
          i === currentPage ? "bg-[#A435F0] text-white" : "text-gray-600 hover:bg-gray-100"
        }">${i}</button>`;
      }
      el.innerHTML = html;
      el.querySelectorAll(".page-btn").forEach((btn) =>
        btn.addEventListener("click", () => {
          currentPage = Number(btn.dataset.page);
          fetchAndRender();
          window.scrollTo({ top: 0, behavior: "smooth" });
        })
      );
    }

    (async () => {
      document.querySelector(`.price-filter[value="${state.price}"]`).checked = true;
      await loadCategoryFilters();
      fetchAndRender();
    })();
  </script>
</body>
</html>
