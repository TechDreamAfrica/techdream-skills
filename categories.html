<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categories — The Coding Professionals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body class="bg-white text-[#1c1d1f]">
  <div id="tcp-header"></div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <h1 class="font-display text-3xl font-bold mb-2">Browse by category</h1>
    <p class="text-gray-500 mb-10">Find courses organized by what you want to learn.</p>
    <div id="categories-grid" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-5"></div>
  </main>

  <div id="tcp-footer"></div>

  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/partials.js"></script>
  <script>
    tcpRenderHeader("");
    tcpRenderFooter("");

    async function load() {
      const grid = document.getElementById("categories-grid");
      grid.innerHTML = tcpSkeletonCards(8);
      const { data: categories } = await tcpSupabase.from("categories").select("*").order("name");
      if (!categories || categories.length === 0) {
        grid.innerHTML = tcpEmptyState({ title: "No categories yet", message: "Run the seed script to populate categories." });
        return;
      }

      const counts = {};
      await Promise.all(
        categories.map(async (c) => {
          const { count } = await tcpSupabase
            .from("courses")
            .select("*", { count: "exact", head: true })
            .eq("category_id", c.id)
            .eq("status", "published");
          counts[c.id] = count || 0;
        })
      );

      grid.innerHTML = categories
        .map(
          (c) => `
        <a href="courses.html?category=${c.slug}" class="tcp-card p-6 flex flex-col gap-2">
          <span class="font-semibold">${c.name}</span>
          <span class="text-sm text-gray-500">${counts[c.id]} course${counts[c.id] === 1 ? "" : "s"}</span>
        </a>`
        )
        .join("");
    }

    load();
  </script>
</body>
</html>
